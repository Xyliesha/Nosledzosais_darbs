<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lumiere - Login</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Lumiere home">
        <img src="images/icons/lumiere_logo.svg" alt="Lumiere" />
      </a>
      <button type="button" class="menu-button" onclick="toggleMenu()">
        <img
          class="nav-icon"
          src="images/icons/menu.svg"
          alt=""
          aria-hidden="true"
        />
        <span data-i18n="menu">Menu</span>
      </button>
      <div class="menu-dropdown" id="menuDropdown">
        <a href="index.html#movieList"
          ><img
            class="nav-icon"
            src="images/icons/movies.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="movies">Movies</span></a
        >
        <a href="index.html#movieList"
          ><img
            class="nav-icon"
            src="images/icons/sessions.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="sessions">Sessions</span></a
        >
        <a href="#"
          ><img
            class="nav-icon"
            src="images/icons/news.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="news">News</span></a
        >
        <a href="#"
          ><img
            class="nav-icon"
            src="images/icons/gifts.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="gifts">Gifts</span></a
        >
        <a href="#"
          ><img
            class="nav-icon"
            src="images/icons/events.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="events">Events</span></a
        >
      </div>

      <nav id="mainNav">
        <a href="index.html"
          ><img
            class="nav-icon"
            src="images/icons/movies.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="movies">Movies</span></a
        >
        <a href="login.html"
          ><img
            class="nav-icon"
            src="images/icons/login.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="login">Login</span></a
        >
        <a href="register.html"
          ><img
            class="nav-icon"
            src="images/icons/register.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="register">Register</span></a
        >
      </nav>

      <div class="lang">
        <span data-i18n="language">Language</span>
        <button type="button" class="small-button" onclick="setLanguage('en')">
          EN
        </button>
        <button type="button" class="small-button" onclick="setLanguage('lv')">
          LV
        </button>
      </div>
    </header>

    <main class="container">
      <form class="form" id="loginForm">
        <h1 data-i18n="login">Login</h1>
        <p id="message"></p>

        <label>
          <span data-i18n="email">Email</span>
          <input type="email" name="email" required />
        </label>

        <label>
          <span data-i18n="password">Password</span>
          <input type="password" name="password" required />
        </label>

        <button type="submit" data-i18n="login">Login</button>

        <p class="auth-help">
          <span data-i18n="no_account"
            >If you do not have an account, you can</span
          >
          <a href="register.html" data-i18n="create_account">create one</a>.
        </p>
      </form>
    </main>

    <footer class="footer">&copy; 2026 Lumiere</footer>
    <script src="js/script.js"></script>
  </body>
</html>
