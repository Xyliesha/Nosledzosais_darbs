<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kino Programma - Login</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">Kino</a>
      <button type="button" class="menu-button" onclick="toggleMenu()">
        <span class="nav-icon icon-menu" aria-hidden="true"></span>
        <span data-i18n="menu">Menu</span>
      </button>

      <nav id="mainNav">
        <a href="index.html"
          ><span class="nav-icon icon-movies" aria-hidden="true"></span
          ><span data-i18n="movies">Movies</span></a
        >
        <a href="login.html"
          ><span class="nav-icon icon-login" aria-hidden="true"></span
          ><span data-i18n="login">Login</span></a
        >
        <a href="register.html"
          ><span class="nav-icon icon-register" aria-hidden="true"></span
          ><span data-i18n="register">Register</span></a
        >
      </nav>

      <div class="lang">
        <span data-i18n="language">Language</span>
        <button type="button" class="small-button" onclick="setLanguage('en')">
          EN
        </button>
        <button type="button" class="small-button" onclick="setLanguage('lv')">
          LV
        </button>
      </div>
    </header>

    <main class="container">
      <form class="form" id="loginForm">
        <h1 data-i18n="login">Login</h1>
        <p id="message"></p>

        <label>
          <span data-i18n="email">Email</span>
          <input type="email" name="email" required />
        </label>

        <label>
          <span data-i18n="password">Password</span>
          <input type="password" name="password" required />
        </label>

        <button type="submit" data-i18n="login">Login</button>
      </form>
    </main>

    <footer class="footer">&copy; 2026 Kino Programma</footer>
    <script src="js/script.js"></script>
  </body>
</html>
