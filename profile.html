<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kino Programma - Profile</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">Kino</a>
      <button type="button" class="menu-button" onclick="toggleMenu()">
        <img
          class="nav-icon"
          src="images/icons/menu.svg"
          alt=""
          aria-hidden="true"
        />
        <span data-i18n="menu">Menu</span>
      </button>
      <div class="menu-dropdown" id="menuDropdown">
        <a href="index.html#movieList"
          ><img
            class="nav-icon"
            src="images/icons/movies.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="movies">Movies</span></a
        >
        <a href="index.html#movieList"
          ><img
            class="nav-icon"
            src="images/icons/sessions.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="sessions">Sessions</span></a
        >
        <a href="#"
          ><img
            class="nav-icon"
            src="images/icons/news.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="news">News</span></a
        >
        <a href="#"
          ><img
            class="nav-icon"
            src="images/icons/gifts.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="gifts">Gifts</span></a
        >
        <a href="#"
          ><img
            class="nav-icon"
            src="images/icons/events.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="events">Events</span></a
        >
      </div>

      <nav id="mainNav">
        <a href="index.html"
          ><img
            class="nav-icon"
            src="images/icons/movies.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="movies">Movies</span></a
        >
        <a href="profile.html"
          ><img
            class="nav-icon"
            src="images/icons/profile.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="profile">Profile</span></a
        >
        <a href="admin.html" class="admin-link"
          ><img
            class="nav-icon"
            src="images/icons/admin.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="admin">Admin</span></a
        >
        <a href="#" id="logoutLink" class="user-link"
          ><img
            class="nav-icon"
            src="images/icons/logout.svg"
            alt=""
            aria-hidden="true"
          /><span data-i18n="logout">Logout</span></a
        >
      </nav>

      <div class="lang">
        <span data-i18n="language">Language</span>
        <button type="button" class="small-button" onclick="setLanguage('en')">
          EN
        </button>
        <button type="button" class="small-button" onclick="setLanguage('lv')">
          LV
        </button>
      </div>
    </header>

    <main class="container">
      <section class="detail">
        <h1 data-i18n="profile">Profile</h1>
        <div id="profileInfo"></div>
      </section>

      <h2 data-i18n="my_reservations">My reservations</h2>
      <section class="sessions" id="reservationList"></section>
    </main>

    <footer class="footer">&copy; 2026 Kino Programma</footer>
    <script src="js/script.js"></script>
  </body>
</html>
