<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111827" />
    <title>Kino Programma - Movie</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">Kino</a>
      <button type="button" class="menu-button" onclick="toggleMenu()">
        <span class="nav-icon icon-menu" aria-hidden="true"></span>
        <span data-i18n="menu">Menu</span>
      </button>

      <nav id="mainNav">
        <a href="index.html"
          ><span class="nav-icon icon-movies" aria-hidden="true"></span
          ><span data-i18n="movies">Movies</span></a
        >
        <a href="login.html" class="guest-link"
          ><span class="nav-icon icon-login" aria-hidden="true"></span
          ><span data-i18n="login">Login</span></a
        >
        <a href="register.html" class="guest-link"
          ><span class="nav-icon icon-register" aria-hidden="true"></span
          ><span data-i18n="register">Register</span></a
        >
        <a href="profile.html" class="user-link"
          ><span class="nav-icon icon-profile" aria-hidden="true"></span
          ><span data-i18n="profile">Profile</span></a
        >
        <a href="admin.html" class="admin-link"
          ><span class="nav-icon icon-admin" aria-hidden="true"></span
          ><span data-i18n="admin">Admin</span></a
        >
        <a href="#" id="logoutLink" class="user-link"
          ><span class="nav-icon icon-logout" aria-hidden="true"></span
          ><span data-i18n="logout">Logout</span></a
        >
      </nav>

      <div class="lang">
        <span data-i18n="language">Language</span>
        <button type="button" class="small-button" onclick="setLanguage('en')">
          EN
        </button>
        <button type="button" class="small-button" onclick="setLanguage('lv')">
          LV
        </button>
      </div>
    </header>

    <main class="container">
      <section id="movieDetails"></section>
      <section class="sessions">
        <h2 data-i18n="sessions">Sessions</h2>
        <div id="sessionList"></div>
      </section>
    </main>

    <footer class="footer">&copy; 2026 Kino Programma</footer>
    <script src="js/script.js"></script>
  </body>
</html>
